  <line x1="6" y1="19" x2="2" y2="23" stroke="#ffb870" stroke-width="1" stroke-linecap="round"/>
  <!-- legs (3 per side) -->
  <line x1="14" y1="13" x2="10" y2="8"  stroke="#ffb870" stroke-width="1" stroke-linecap="round"/>
  <line x1="17" y1="12" x2="17" y2="7"  stroke="#ffb870" stroke-width="1" stroke-linecap="round"/>
  <line x1="20" y1="13" x2="24" y2="8"  stroke="#ffb870" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="19" x2="10" y2="24" stroke="#ffb870" stroke-width="1" stroke-linecap="round"/>
  <line x1="17" y1="20" x2="17" y2="25" stroke="#ffb870" stroke-width="1" stroke-linecap="round"/>
  <line x1="20" y1="19" x2="24" y2="24" stroke="#ffb870" stroke-width="1" stroke-linecap="round"/>
</svg>
