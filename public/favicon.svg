<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0400"/>
  <circle cx="16" cy="16" r="14" fill="none" stroke="#ffb870" stroke-width="0.5" opacity="0.3"/>
  <!-- ant body: three segments -->
  <circle cx="8"  cy="16" r="3.5" fill="#ffb870"/>
  <circle cx="16" cy="16" r="4"   fill="#ffb870"/>
  <circle cx="25" cy="16" r="4.5" fill="#ffb870"/>
  <!-- antennae -->
