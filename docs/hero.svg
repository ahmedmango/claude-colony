<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Claude Colony — pixel-art ant farm for your Claude Code sessions">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a0a22"/>
      <stop offset="45%" stop-color="#3a1a45"/>
      <stop offset="85%" stop-color="#8a3a4a"/>
      <stop offset="100%" stop-color="#d48250"/>
    </linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a2f1a"/>
      <stop offset="40%"  stop-color="#3a2010"/>
      <stop offset="100%" stop-color="#1a0a05"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff5cc"/>
      <stop offset="100%" stop-color="#e8b87a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- sky + stars -->
  <rect x="0" y="0" width="1200" height="140" fill="url(#sky)"/>
  <circle cx="100"  cy="30"  r="1.2" fill="#fff" opacity="0.9"/>
  <circle cx="220"  cy="52"  r="1"   fill="#fff" opacity="0.7"/>
  <circle cx="380"  cy="22"  r="1.2" fill="#fff" opacity="0.9"/>
  <circle cx="520"  cy="70"  r="1"   fill="#fff" opacity="0.7"/>
  <circle cx="700"  cy="40"  r="1.2" fill="#fff" opacity="0.9"/>
  <circle cx="880"  cy="28"  r="1"   fill="#fff" opacity="0.6"/>
  <circle cx="990"  cy="58"  r="1.3" fill="#fff" opacity="0.9"/>

  <!-- moon -->
  <circle cx="1060" cy="60" r="28" fill="url(#moon)" filter="url(#glow)"/>

  <!-- grass -->
  <rect x="0" y="140" width="1200" height="12" fill="#2f4a22"/>
  <rect x="0" y="140" width="1200" height="3"  fill="#3a5a2a"/>

  <!-- soil -->
  <rect x="0" y="152" width="1200" height="368" fill="url(#soil)"/>

  <!-- trees (4 projects) -->
  <g font-family="monospace" font-size="11" fill="#f2d9a8">
    <!-- tree 1 -->
    <ellipse cx="180" cy="100" rx="42" ry="28" fill="#2a5028"/>
    <rect x="176" y="115" width="8" height="40" fill="#2a1605"/>
    <rect x="155" y="78" width="50" height="16" fill="#0a0400" stroke="#5a3a20"/>
    <text x="180" y="90" text-anchor="middle" font-weight="bold">~/api</text>

    <!-- tree 2 -->
    <ellipse cx="440" cy="105" rx="45" ry="30" fill="#25443a"/>
    <rect x="436" y="120" width="8" height="36" fill="#2a1605"/>
    <rect x="405" y="82" width="70" height="16" fill="#0a0400" stroke="#5a3a20"/>
    <text x="440" y="94" text-anchor="middle" font-weight="bold">~/auth-svc</text>

    <!-- tree 3 -->
    <ellipse cx="700" cy="100" rx="44" ry="30" fill="#3a2c42"/>
    <rect x="696" y="115" width="8" height="40" fill="#2a1605"/>
    <rect x="668" y="78" width="64" height="16" fill="#0a0400" stroke="#5a3a20"/>
    <text x="700" y="90" text-anchor="middle" font-weight="bold">~/webapp</text>

    <!-- tree 4 -->
    <ellipse cx="960" cy="108" rx="40" ry="27" fill="#4a3020"/>
    <rect x="956" y="122" width="8" height="33" fill="#2a1605"/>
    <rect x="930" y="86" width="60" height="16" fill="#0a0400" stroke="#5a3a20"/>
    <text x="960" y="98" text-anchor="middle" font-weight="bold">~/dashing</text>
  </g>

  <!-- tunnels -->
  <g stroke="#1a0800" stroke-width="16" fill="none" stroke-linecap="round">
    <path d="M 180 160 L 180 440"/>
    <path d="M 440 160 L 440 440"/>
    <path d="M 700 160 L 700 440"/>
    <path d="M 960 160 L 960 440"/>
  </g>

  <!-- pheromone trails (subtle) -->
  <g stroke="#ffb870" stroke-width="2" fill="none" stroke-dasharray="4 6" opacity="0.5">
    <path d="M 440 160 L 440 440"/>
  </g>

  <!-- ants -->
  <!-- scout on ~/api (red) -->
  <g transform="translate(175 240)">
    <circle cx="3"  cy="5" r="3.2" fill="#c04020"/>
    <circle cx="11" cy="5" r="3.2" fill="#c04020"/>
    <circle cx="20" cy="5" r="3.2" fill="#c04020"/>
    <line x1="5" y1="2" x2="19" y2="2" stroke="#c04020"/>
    <line x1="5" y1="8" x2="19" y2="8" stroke="#c04020"/>
  </g>
  <!-- worker on ~/auth-svc (black + yellow cargo) -->
  <g transform="translate(430 290)">
    <circle cx="8" cy="-6" r="3" fill="#ffde5a" filter="url(#glow)"/>
    <circle cx="3"  cy="5" r="3.2" fill="#1a0a05"/>
    <circle cx="11" cy="5" r="3.2" fill="#1a0a05"/>
    <circle cx="20" cy="5" r="3.2" fill="#1a0a05"/>
    <line x1="5" y1="2" x2="19" y2="2" stroke="#1a0a05"/>
    <line x1="5" y1="8" x2="19" y2="8" stroke="#1a0a05"/>
  </g>
  <!-- worker on ~/auth-svc second ant -->
  <g transform="translate(430 380)">
    <circle cx="3"  cy="5" r="3.2" fill="#1a0a05"/>
    <circle cx="11" cy="5" r="3.2" fill="#1a0a05"/>
    <circle cx="20" cy="5" r="3.2" fill="#1a0a05"/>
    <line x1="5" y1="2" x2="19" y2="2" stroke="#1a0a05"/>
    <line x1="5" y1="8" x2="19" y2="8" stroke="#1a0a05"/>
  </g>
  <!-- WAITING ant on ~/webapp — orange ring -->
  <g transform="translate(690 320)">
    <circle cx="10" cy="5" r="20" fill="none" stroke="#ff8f3a" stroke-width="2" opacity="0.6"/>
    <circle cx="10" cy="5" r="26" fill="none" stroke="#ff8f3a" stroke-width="1" opacity="0.3"/>
    <circle cx="3"  cy="5" r="3.2" fill="#1a0a05"/>
    <circle cx="11" cy="5" r="3.2" fill="#1a0a05"/>
    <circle cx="20" cy="5" r="3.2" fill="#1a0a05"/>
    <line x1="5" y1="2" x2="19" y2="2" stroke="#1a0a05"/>
    <line x1="5" y1="8" x2="19" y2="8" stroke="#1a0a05"/>
  </g>
  <!-- speech bubble above waiting ant -->
  <g transform="translate(705 275)">
    <rect x="0" y="0" width="140" height="26" rx="8" fill="#fffbe6" stroke="#1a0a05" stroke-width="2"/>
    <polygon points="12,26 16,34 22,26" fill="#fffbe6" stroke="#1a0a05" stroke-width="2"/>
    <text x="70" y="17" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#1a0a05">? push to main?</text>
  </g>
  <!-- scout on ~/dashing (red, carrying cyan cargo) -->
  <g transform="translate(950 250)">
    <circle cx="8" cy="-6" r="3" fill="#6ae0ff" filter="url(#glow)"/>
    <circle cx="3"  cy="5" r="3.2" fill="#c04020"/>
    <circle cx="11" cy="5" r="3.2" fill="#c04020"/>
    <circle cx="20" cy="5" r="3.2" fill="#c04020"/>
    <line x1="5" y1="2" x2="19" y2="2" stroke="#c04020"/>
    <line x1="5" y1="8" x2="19" y2="8" stroke="#c04020"/>
  </g>

  <!-- queen chamber at bottom -->
  <g>
    <ellipse cx="600" cy="470" rx="110" ry="32" fill="#3a1a08" stroke="#5a2a15" stroke-width="2"/>
    <ellipse cx="600" cy="470" rx="110" ry="32" fill="none" stroke="#c04a1a" stroke-width="1" opacity="0.4"/>
    <ellipse cx="600" cy="478" rx="20" ry="11" fill="#c03a2a" filter="url(#glow)"/>
    <text x="600" y="460" text-anchor="middle" font-family="monospace" font-size="10" fill="#f2d9a8" letter-spacing="0.1em">⚐ QUEEN (YOU)</text>
    <circle cx="560" cy="480" r="3" fill="#ffe8a8"/>
    <circle cx="640" cy="482" r="3" fill="#ffe8a8"/>
    <circle cx="580" cy="488" r="3" fill="#ffe8a8"/>
  </g>

  <!-- title -->
  <text x="24" y="36" font-family="monospace" font-size="18" font-weight="bold" fill="#ffb870" letter-spacing="0.18em">◆ CLAUDE COLONY</text>
  <text x="24" y="56" font-family="monospace" font-size="11" fill="#8a7a60" letter-spacing="0.12em">watch your Claude Code sessions · observer mode · MIT</text>
</svg>
